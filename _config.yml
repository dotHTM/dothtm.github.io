# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: dotHTM.github.io
email: dothtm@icloud.com
description: > # this means to ignore newlines until "baseurl:"
  
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://dothtm.github.io" # the base hostname & protocol for your site
twitter_username: dothtm
github_username:  dothtm
mastodon_username:  dothtm

# Build settings
markdown: kramdown
md: kramdown

exclude: ['node_modules','gruntfile.js','config.rb','brokenLinks.mdown','*.todo','package.json','*.sublime-project']

logo: /image/dot_logo.png

dateformat: "%b %-d, %Y"
