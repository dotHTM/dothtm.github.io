version: '3'
services:
  jekyll:
    image: dothtm/alpine_jekyll_grunt
    # build: 
    #   context: ./docker/alpine/
    #   dockerfile: jekyll.dockerfile
    ports:
      - "4000:4000"
    volumes:
      - "./:/app/static_src/"
    entrypoint: ash /jekyll_entry.sh

  grunt:
    image: dothtm/alpine_jekyll_grunt
    # build: 
    #   context: ./docker/alpine/
    #   dockerfile: grunt.dockerfile
    ports:
      - "35729:35729"
    volumes:
      - "./:/app/static_src/"
    entrypoint: ash /grunt_entry.sh

