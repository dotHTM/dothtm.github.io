<footer id="site-footer">
  <div class="wrapper">
    <h2 class="footer-heading">{{ site.title }}</h2>
    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <li>{{ site.title }}</li>
          <li><a href="mailto:{{ site.email }}">{{ site.email }}</a></li>
        </ul>
      </div>
      
      <div class="linklist">
        <div class="linklist-link" style="max-width:48pt;">
          <a href="https://github.com/dothtm"  alt="Github Repos"> 
          {% include icon/roundrect/github.svg %}
          </a>
        </div>
        <div class="linklist-link" style="max-width:48pt;">
          <a href="https://twitter.com/dothtm" alt="Twitter"> 
            {% include icon/roundrect/twitter.svg %}
          </a>
        </div>
        <div class="linklist-link" style="max-width:48pt;">
          <a rel="me" href="https://mastodon.social/@dotHTM"  alt="Mastodon"> 
           {% include icon/roundrect/mastodon.svg %}
          </a>
        </div>
        <div class="linklist-link" style="max-width:48pt;">
          <a rel="me" href="https://discord.gg/VP9SHSc"  alt="Discord"> 
           {% include icon/roundrect/discord.svg %}
          </a>
        </div>
      </div>
      
      <div class="footer-col footer-col-3">
        <p>{{ site.description }}</p>
      </div>
    </div>
  </div>
</footer>
