<header id="site-header">
  <div class="wrapper">
    <a id="site-title" href="{{ site.baseurl }}/">
      <span class="dot">dot</span><span class="htm">HTM</span><span class="platform">.github.io</span>
    </a>
    <div id="site-bar">
          <div id="site-desc">
            <p>Striving to be immutable, even if useless.</p>
          </div>
          
       <div class="dark-mode-switch">
        <input id="dark-mode" type="checkbox" onclick="document.documentElement.classList.toggle('dark-mode')">	
        <label for="dark-mode">Invert Contrast</label>
      </div>
          
          <nav id="site-nav">
            <span class="divider">|</span>
            {% assign sorted_pages = site.pages | sort: "nav" %}
            {% for my_page in sorted_pages %}
            {% if my_page.nav %}
            {% if my_page.title %}
            <a class="page-link" href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a> <span class="divider">|</span>
            {% endif %}
            {% endif %}
            {% endfor %}
          </nav>
          </div>
    
  </div>
</header>
