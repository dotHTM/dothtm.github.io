<header id="site-header">
  <div class="wrapper">
    <a id="site-title" href="{{ site.baseurl }}/">
      <span class="dot">dot</span><span class="htm">HTM</span><span class="platform">.github.io</span>
    </a>
    <div id="site-bar">
          <div id="site-desc">
            <p>Striving to be immutable, even if useless.</p>
          </div>
          
          
          <nav id="site-nav">
            <span class="divider">|</span>
            {% for my_page in site.pages %}
            {% if my_page.error %}{% else %}
            {% if my_page.title %}
            <a class="page-link" href="{{ my_page.url | prepend: site.baseurl }}">{{ my_page.title }}</a> <span class="divider">|</span>
            {% endif %}
            {% endif %}
            {% endfor %}
          </nav>
          </div>
    
  </div>
</header>
