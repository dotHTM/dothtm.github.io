{%if page.hide_title%}
{%else%}
<div class="wrapper post-header">
  <header>
    <div class="title_wrap">
      <h1 class="post-title">{%if page.bullet%}{{page.bullet}}{%else%}{{layout.default_bullet}}{%endif%} {{ page.title }}</h1>
      <div class="date_string">{% if page.date %}<p>{{ page.date | date: site.dateformat }}</p>
        {% endif %}{% if page.updated %}<p><strong>Updated:</strong> {{ page.updated | date: site.dateformat }}</p>
        {% endif %}</div>
    </div>
  </header>
</div>
{%endif%}
