exclude: |
    (?x)^(
        _sass/_syntax-highlighting.scss
    )$
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
-   repo: https://github.com/thibaudcolas/curlylint
    rev: v0.13.1
    hooks:
    -   id: curlylint
-   repo: https://github.com/rtts/djhtml
    rev: 3.0.7
    hooks:
    -   id: djhtml
    -   id: djcss
